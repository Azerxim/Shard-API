    <body>
        <nav class="navbar is-TD-ultradarkblue" style="z-index: 10;" role="navigation" aria-label="main navigation">
            <div class="navbar-brand">
                <!-- Desktop -->
                <div class="flex-center-vertical gap-5 is-hidden-touch">
                    <a class="navbar-item" href="https://topazdev.fr">
                        <img src="https://dl.topazdev.fr/stock/images/web/topazdev-smoothwhite.png" alt="TopazDev">
                    </a>
                    <a class="navbar-item" href="https://spinelle.eu">
                        <img src="https://dl.topazdev.fr/stock/images/web/spinelle_galaxie_white.png" alt="Spinelle Galaxie">
                    </a>
                </div>
                <!-- Touch -->
                <div class="flex-center-full gap-5 is-hidden-desktop" style="width: 100%;">
                    <a class="navbar-item" href="https://topazdev.fr">
                        <img src="https://dl.topazdev.fr/stock/images/web/topazdev-smoothwhite.png" alt="TopazDev">
                    </a>
                    <a class="navbar-item" href="https://spinelle.eu">
                        <img src="https://dl.topazdev.fr/stock/images/web/spinelle_galaxie_white.png" alt="Spinelle Galaxie">
                    </a>
                </div>
          
                <!-- Navbar burger -->
                <a role="button" class="navbar-burger" data-target="navMenu" aria-label="menu" aria-expanded="false">
                    <span aria-hidden="true"></span>
                    <span aria-hidden="true"></span>
                    <span aria-hidden="true"></span>
                </a>
            </div>
          
            <div class="navbar-menu" id="navMenu">
                <div class="navbar-start">
                    
                    <a class="navbar-item" href="/docs">
                        <span>Docs</span>
                    </a>
          
                </div>
            
                <div class="navbar-end">
                    <!-- <hr/> -->
                    <div class="navbar-item">
                        <div class="buttons">
                            <!-- <a class="button is-TD-ultradarkblue" href="/contact">
                                <i class="fa-solid fa-info"></i>
                            </a> -->
                        </div>
                    </div>
                </div>
            </div>
        </nav>
          
        <script>
            document.addEventListener('DOMContentLoaded', () => {
                // Get all "navbar-burger" elements
                const $navbarBurgers = Array.prototype.slice.call(document.querySelectorAll('.navbar-burger'), 0);
            
                // Check if there are any navbar burgers
                if ($navbarBurgers.length > 0) {
            
                    // Add a click event on each of them
                    $navbarBurgers.forEach( el => {
                        el.addEventListener('click', () => {
                
                            // Get the target from the "data-target" attribute
                            const target = el.dataset.target;
                            const $target = document.getElementById(target);
                
                            // Toggle the "is-active" class on both the "navbar-burger" and the "navbar-menu"
                            el.classList.toggle('is-active');
                            $target.classList.toggle('is-active');
                        });
                    });
                }
            });
        </script>

        <div></div>

    </body>
